name: AUD Exchange Rate Notifier

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 라이브러리 설치
      run: pip install requests beautifulsoup4 pytz

    - name: 환율 조회 스크립트 실행
      run: python currency_check.py

    - name: 깃허브에 결과 저장 및 커밋 푸시 (이 과정이 구글 챗 알림을 발생시킴)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add history.csv commit_message.txt
        
        # 파이썬이 만든 커밋 메시지 읽어오기
        COMMIT_MSG=$(cat commit_message.txt)
        
        # 해당 메시지를 제목으로 커밋 후 푸시
        git commit -m "$COMMIT_MSG" || echo "변경된 내용이 없습니다."
        git push
