name: AUD Exchange Rate Notifier

on:
  schedule:
    # 한국 시간 기준 오전 10시 (UTC 기준 오전 1시) 실행 (월~금)
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 (원할 때 언제든 테스트 가능하게 해줌)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 파이썬 봇 실행
      env:
        GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
      run: python currency_check.py
