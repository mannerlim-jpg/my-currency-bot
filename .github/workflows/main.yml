name: AUD Exchange Rate Notifier

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 히스토리를 가져와야 덮어쓰기가 가능합니다.

    - name: 파이썬 설정/실행
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 라이브러리 설치/실행
      run: |
        pip install requests beautifulsoup4 pytz
        python currency_check.py

    - name: 강제 푸시 (저장소 클린 유지 + 짧은 알림)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add history.csv commit_message.txt
        COMMIT_MSG=$(cat commit_message.txt)
        
        # 마지막 커밋을 수정해서 덮어버립니다. (커밋이 쌓이지 않음)
        git commit --amend -m "$COMMIT_MSG" || git commit -m "$COMMIT_MSG"
        git push --force origin main
